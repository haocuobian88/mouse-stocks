<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐭 美股鼠錢錢</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0F1117; color: #FFF; min-height: 100vh; }
  .header { background: linear-gradient(135deg, #1DB954, #158a3e); padding: 20px; text-align: center; }
  .header h1 { font-size: 24px; font-weight: 700; }
  .header p { font-size: 13px; opacity: 0.8; margin-top: 4px; }
  .summary-bar { display: flex; gap: 10px; padding: 14px; background: #1A1D2E; border-bottom: 1px solid #2A2D3E; overflow-x: auto; }
  .summary-item { flex: 1; min-width: 110px; background: #22253A; border-radius: 10px; padding: 10px; text-align: center; }
  .summary-item .label { font-size: 11px; color: #888; margin-bottom: 4px; }
  .summary-item .value { font-size: 16px; font-weight: 700; }
  .section { padding: 16px; }
  .section-title { font-size: 14px; font-weight: 600; color: #AAA; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
  .section-sub { font-size: 13px; color: #666; margin-bottom: 8px; padding: 0 16px; }
  .section-divider { border: none; border-top: 2px solid #2A2D3E; margin: 4px 16px 16px; }
  .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 0 16px; }
  .card { background: #1A1D2E; border-radius: 12px; padding: 14px; border: 2px solid #2A2D3E; transition: all 0.3s; position: relative; }
  .card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.4); }
  .card.up { border-color: #E53935; }
  .card.down { border-color: #00B900; }
  .card .symbol { font-size: 16px; font-weight: 700; text-align: center; color: #FFF; }
  .card .price { font-size: 28px; font-weight: 700; text-align: center; margin: 8px 0 4px; color: #FFF; }
  .card.up .price { color: #E53935; }
  .card.down .price { color: #00B900; }
  .card .change-row { display: flex; justify-content: space-between; font-size: 13px; font-weight: 600; color: #888; }
  .card.up .change-row { color: #E53935; }
  .card.down .change-row { color: #00B900; }
  .card .holding-pnl { text-align: center; font-size: 11px; margin-top: 8px; padding-top: 8px; border-top: 1px solid #2A2D3E; color: #888; }
  .card .holding-pnl span { font-weight: 700; }
  .card .remove-btn { position: absolute; top: 6px; right: 8px; background: none; border: none; color: #444; font-size: 18px; cursor: pointer; line-height: 1; }
  .card .remove-btn:hover { color: #E53935; }
  .add-section { padding: 0 16px 16px; }
  .add-form { display: flex; gap: 8px; }
  .add-form input { flex: 1; background: #1A1D2E; border: 1px solid #2A2D3E; border-radius: 10px; padding: 12px 14px; color: #FFF; font-size: 14px; outline: none; }
  .add-form input:focus { border-color: #1DB954; }
  .add-form input::placeholder { color: #555; }
  .add-btn { background: #1DB954; border: none; border-radius: 10px; padding: 12px 20px; color: #FFF; font-size: 14px; font-weight: 600; cursor: pointer; white-space: nowrap; }
  .add-btn:hover { background: #17a349; }
  .refresh-btn { display: flex; align-items: center; gap: 6px; background: #22253A; border: 1px solid #2A2D3E; border-radius: 8px; padding: 8px 14px; color: #AAA; font-size: 13px; cursor: pointer; margin-left: auto; }
  .refresh-btn:hover { color: #FFF; border-color: #1DB954; }
  .refresh-btn.spinning svg { animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .empty-state { text-align: center; padding: 24px; color: #555; font-size: 13px; }
  .last-update { font-size: 11px; color: #555; text-align: center; padding: 12px; }
  .error-msg { background: #2a1a1a; border: 1px solid #E53935; border-radius: 8px; padding: 12px; margin: 8px 16px; font-size: 13px; color: #E53935; }
</style>
</head>
<body>

<div class="header">
  <h1>🐭 美股鼠錢錢</h1>
  <p id="last-update">載入中...</p>
</div>

<div class="summary-bar">
  <div class="summary-item"><div class="label">總市值(台幣)</div><div class="value" id="total-value">--</div></div>
  <div class="summary-item"><div class="label">總損益</div><div class="value" id="total-pnl">--</div></div>
  <div class="summary-item"><div class="label">🇹🇼 台股</div><div class="value" id="tw-pnl">--</div></div>
  <div class="summary-item"><div class="label">🇺🇸 美股</div><div class="value" id="us-pnl">--</div></div>
</div>

<div class="section">
  <div class="section-title">
    📊 持股損益
    <button class="refresh-btn" id="refresh-btn" onclick="loadAll()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M23 4v6h-6M1 20v-6h6"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/>
      </svg>
      更新
    </button>
  </div>
</div>

<div id="error-area"></div>
<p class="section-sub">🇹🇼 台股</p>
<div class="grid" id="tw-holdings"><div class="empty-state" style="grid-column:span 2">載入中...</div></div>
<p class="section-sub" style="margin-top:16px;">🇺🇸 美股</p>
<div class="grid" id="us-holdings"><div class="empty-state" style="grid-column:span 2">載入中...</div></div>

<hr class="section-divider" style="margin-top:20px;">

<div class="section">
  <div class="section-title">🔍 追蹤個股</div>
</div>
<div class="add-section">
  <div class="add-form">
    <input type="text" id="watch-input" placeholder="輸入代號，如 NVDA 或 2454" onkeydown="if(event.key==='Enter') addWatch()">
    <button class="add-btn" onclick="addWatch()">＋ 新增</button>
  </div>
</div>
<p class="section-sub">🇹🇼 台股追蹤</p>
<div class="grid" id="tw-watch"></div>
<p class="section-sub" style="margin-top:16px;">🇺🇸 美股追蹤</p>
<div class="grid" id="us-watch"></div>
<div class="empty-state" id="watch-empty">還沒有追蹤個股，在上方輸入代號新增</div>
<div class="last-update" id="footer-time"></div>

<script>
// 所有 API 都透過 Apps Script 中轉，解決 CORS 問題
const API = 'https://script.google.com/macros/s/AKfycbzxrGg2OGORxTnp0GH2JP8QIRV_ilEgkpzwgcbJkQCydMo2qgaaCOeenj6I6EzdixpT/exec';
const FX = 31.7;
let watchList = JSON.parse(localStorage.getItem('mouseWatchList') || '[]');

function makeCard(symbol, current, prevClose, cost, shares, isTW, isWatch) {
  const diff = (prevClose && current) ? (current - prevClose) : null;
  const pct = (diff && prevClose) ? (diff / prevClose * 100) : null;
  const isUp = diff !== null ? diff >= 0 : null;
  const cls = isUp === null ? '' : isUp ? 'up' : 'down';
  const arrow = isUp === null ? '' : isUp ? '▲' : '▼';
  const amt = diff !== null ? Math.abs(diff).toFixed(isTW ? 0 : 2) : '--';
  const pctStr = pct !== null ? Math.abs(pct).toFixed(2) + '%' : '--';
  const priceStr = current ? current.toFixed(2) : '--';
  let pnlHtml = '';
  if (!isWatch && cost && shares && current) {
    const pnlPct = ((current - cost) / cost * 100);
    const pnlAmt = (current - cost) * shares;
    const pc = pnlPct >= 0 ? '#E53935' : '#00B900';
    const ps = pnlPct >= 0 ? '+' : '';
    const cur = isTW ? 'NT$' : '$';
    pnlHtml = `<div class="holding-pnl">持有 <span style="color:${pc}">${ps}${pnlPct.toFixed(2)}%</span> · <span style="color:${pc}">${ps}${cur}${Math.abs(pnlAmt).toLocaleString('zh-TW',{maximumFractionDigits:0})}</span></div>`;
  }
  const rmBtn = isWatch ? `<button class="remove-btn" onclick="removeWatch('${symbol}')">×</button>` : '';
  return `<div class="card ${cls}">${rmBtn}<div class="symbol">${symbol}</div><div class="price">${priceStr}</div><div class="change-row"><span>${arrow} ${amt}</span><span>${pctStr}</span></div>${pnlHtml}</div>`;
}

async function loadAll() {
  const btn = document.getElementById('refresh-btn');
  btn.classList.add('spinning');
  document.getElementById('error-area').innerHTML = '';
  let holdings = [];
  try {
    const res = await fetch(API);
    const data = await res.json();
    holdings = data.holdings || [];
  } catch(e) {
    document.getElementById('error-area').innerHTML = '<div class="error-msg">⚠️ 無法載入持股資料，請確認 Apps Script 已部署</div>';
    btn.classList.remove('spinning');
    return;
  }

  const twH = holdings.filter(h => h.isTW);
  const usH = holdings.filter(h => !h.isTW);
  let twHtml = '', twVal = 0, twCost = 0;
  twH.forEach(h => {
    if (!h.current) return;
    twHtml += makeCard(h.symbol, h.current, h.prevClose, h.cost, h.shares, true, false);
    twVal += h.current * h.shares;
    twCost += h.cost * h.shares;
  });
  document.getElementById('tw-holdings').innerHTML = twHtml || '<div class="empty-state" style="grid-column:span 2">無台股持股</div>';

  let usHtml = '', usVal = 0, usCost = 0;
  usH.forEach(h => {
    if (!h.current) return;
    usHtml += makeCard(h.symbol, h.current, h.prevClose, h.cost, h.shares, false, false);
    usVal += h.current * h.shares * FX;
    usCost += h.cost * h.shares * FX;
  });
  document.getElementById('us-holdings').innerHTML = usHtml || '<div class="empty-state" style="grid-column:span 2">無美股資料</div>';

  const tot = twVal + usVal, totCost = twCost + usCost;
  const totPnl = tot - totCost, twPnl = twVal - twCost, usPnl = usVal - usCost;
  const fmt = v => (v >= 0 ? '+' : '') + (v / 10000).toFixed(1) + '萬';
  const c = v => v >= 0 ? '#E53935' : '#00B900';
  document.getElementById('total-value').textContent = 'NT$' + (tot / 10000).toFixed(1) + '萬';
  document.getElementById('total-pnl').innerHTML = `<span style="color:${c(totPnl)}">${fmt(totPnl)}</span>`;
  document.getElementById('tw-pnl').innerHTML = `<span style="color:${c(twPnl)}">${fmt(twPnl)}</span>`;
  document.getElementById('us-pnl').innerHTML = `<span style="color:${c(usPnl)}">${fmt(usPnl)}</span>`;

  await loadWatch();
  const now = new Date().toLocaleString('zh-TW', { timeZone: 'Asia/Taipei' });
  document.getElementById('last-update').textContent = `更新：${now}`;
  document.getElementById('footer-time').textContent = `最後更新：${now}`;
  btn.classList.remove('spinning');
}

async function loadWatch() {
  if (!watchList.length) {
    document.getElementById('tw-watch').innerHTML = '';
    document.getElementById('us-watch').innerHTML = '';
    document.getElementById('watch-empty').style.display = 'block';
    return;
  }
  document.getElementById('watch-empty').style.display = 'none';
  const symbols = watchList.map(w => w.symbol).join(',');
  let prices = {};
  try {
    const res = await fetch(API + '?watch=' + symbols);
    prices = await res.json();
  } catch(e) {}

  const twW = watchList.filter(w => w.isTW);
  const usW = watchList.filter(w => !w.isTW);

  let twHtml = '';
  twW.forEach(w => {
    const p = prices[w.symbol];
    twHtml += p ? makeCard(w.symbol, p.current, p.prevClose, null, null, true, true)
                : `<div class="card"><button class="remove-btn" onclick="removeWatch('${w.symbol}')">×</button><div class="symbol">${w.symbol}</div><div class="price" style="color:#555">--</div><div class="change-row"><span>--</span><span>--</span></div></div>`;
  });
  document.getElementById('tw-watch').innerHTML = twHtml || '<div style="color:#555;font-size:13px;padding:8px 0;">尚無台股追蹤</div>';

  let usHtml = '';
  usW.forEach(w => {
    const p = prices[w.symbol];
    usHtml += (p && p.current) ? makeCard(w.symbol, p.current, p.prevClose, null, null, false, true)
                                : `<div class="card"><button class="remove-btn" onclick="removeWatch('${w.symbol}')">×</button><div class="symbol">${w.symbol}</div><div class="price" style="color:#555">--</div><div class="change-row"><span>--</span><span>--</span></div></div>`;
  });
  document.getElementById('us-watch').innerHTML = usHtml || '<div style="color:#555;font-size:13px;padding:8px 0;">尚無美股追蹤</div>';
}

async function addWatch() {
  const input = document.getElementById('watch-input');
  const symbol = input.value.trim().toUpperCase();
  if (!symbol) return;
  if (watchList.find(w => w.symbol === symbol)) { alert(symbol + ' 已在追蹤清單'); return; }
  watchList.push({ symbol, isTW: /^\d+$/.test(symbol) });
  localStorage.setItem('mouseWatchList', JSON.stringify(watchList));
  input.value = '';
  await loadWatch();
}

function removeWatch(symbol) {
  watchList = watchList.filter(w => w.symbol !== symbol);
  localStorage.setItem('mouseWatchList', JSON.stringify(watchList));
  loadWatch();
}

loadAll();
setInterval(loadAll, 5 * 60 * 1000);
</script>
</body>
</html>
